name: CI

on:
  push:
    branches: [main, 'chore/**', 'feat/**', 'fix/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: build + typecheck + test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      # Build first: the extension's typecheck resolves @azgov-ide/agents-client from its built
      # dist/*.d.ts, so agents-client must be compiled before tsc runs on the extension.
      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  package:
    name: package vsix
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package VSIX
        working-directory: packages/extension
        run: npx --yes @vscode/vsce package --no-dependencies --out azgov-ide.vsix

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: azgov-ide-vsix
          path: packages/extension/azgov-ide.vsix
          if-no-files-found: error
